name: Bug report
description: Report a broken workflow, build failure, or incorrect output.
title: "[bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: input
    id: kernel_version
    attributes:
      label: Kernel version
      description: Example: 6.12 or 5.15
      placeholder: 6.12
  - type: input
    id: command
    attributes:
      label: Command
      description: Exact `llbic` or `docker run` command used
      placeholder: docker run --rm -v "$(pwd)/out:/out" ghcr.io/cyruscyliu/llbic:latest 6.12
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste the relevant part of `llbic.log` or stderr output
      render: shell
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Docker image tag, clang version, host architecture, or anything relevant
